name: Dependency Updates

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    name: Check for dependency updates
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Check for updates
        id: check
        run: |
          if ./scripts/check-dep-updates.sh; then
            echo "updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "updates=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply updates
        if: steps.check.outputs.updates == 'true'
        run: ./scripts/check-dep-updates.sh --update

      - name: Create pull request
        if: steps.check.outputs.updates == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="deps/auto-update-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add scripts/build-release.sh
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(deps): update pinned dependency versions"
          git push -u origin "$BRANCH"

          # Capture update summary for PR body
          SUMMARY="$(./scripts/check-dep-updates.sh 2>&1 || true)"

          gh pr create \
            --title "chore(deps): update pinned dependency versions" \
            --body "$(cat <<EOF
          ## Dependency Updates

          \`\`\`
          $SUMMARY
          \`\`\`

          Auto-generated by the weekly dependency checker.
          Please verify the build works before merging.

          ## Test plan
          - [ ] Build compiles with updated deps
          - [ ] Run \`./scripts/build-release.sh --no-sign --no-dmg\` locally
          EOF
          )" \
            --label "dependencies"
