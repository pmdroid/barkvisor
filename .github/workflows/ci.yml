name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        with:
          install: true

      - name: SwiftLint
        run: >
          mise exec -- env
          XCODE_DEFAULT_TOOLCHAIN_OVERRIDE="$(dirname "$(dirname "$(mise which swift)")")"
          swiftlint lint --quiet

      - name: SwiftFormat check
        run: mise exec -- swiftformat --lint Sources/ Tests/

  build:
    name: Build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        with:
          install: true

      - name: Build Swift package
        run: mise exec -- swift build -c release

  test:
    name: Test
    runs-on: macos-26
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        with:
          install: true

      - name: Run tests
        run: mise exec -- swift test
