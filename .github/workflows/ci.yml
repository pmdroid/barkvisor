name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install swiftlint swiftformat

      - name: SwiftLint
        run: swiftlint lint --quiet

      - name: SwiftFormat check
        run: swiftformat --lint Sources/ Tests/

  build:
    name: Build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build Swift package
        run: swift build -c release

  test:
    name: Test
    runs-on: macos-26
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test
